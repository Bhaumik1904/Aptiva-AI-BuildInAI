# APTIVA AI — Configuration
# All feature flags and runtime settings

# ── Feature Flags ────────────────────────────────────────────────────────────
enable_reasoning_enrichment: false   # Set true to use Gemini for reasoning
enable_streamlit_demo: true
enable_judge_mode: true
enable_comparison_mode: true
enable_hireability_index: true

# ── JD Intelligence Agent (Sprint 4) ─────────────────────────────────────────
# Model resolution order (first non-empty value wins):
#   1. jd_agent.model          ← change this to switch models
#   2. gemini_model (below)    ← global fallback
#   3. Hard-coded: gemini-2.5-flash
# To switch to gemini-2.5-pro, change model: "gemini-2.5-pro" — no code change needed.
jd_agent:
  enabled: true
  model: "gemini-2.5-flash"      # Fast, cost-efficient, great for structured extraction
  temperature: 0.1               # Near-zero for deterministic JSON output
  max_output_tokens: 2048        # Sufficient for all JD field extraction

# ── Resume Intelligence Agent (Sprint 5A) ────────────────────────────────────
# Same 3-tier model resolution as jd_agent:
#   1. resume_agent.model   ← change this to switch models
#   2. gemini_model (below) ← global fallback
#   3. Hard-coded: gemini-2.5-flash
resume_agent:
  enabled: true
  model: "gemini-2.5-flash"      # Configurable — change to gemini-2.5-pro if needed
  temperature: 0.1               # Near-zero for deterministic extraction
  max_output_tokens: 2048        # Sufficient for full resume extraction

# ── Candidate Intelligence Engine (Sprint 5B) ────────────────────────────────
# Same 3-tier model resolution as jd_agent and resume_agent:
#   1. matching_agent.model ← change this to switch models
#   2. gemini_model (below) ← global fallback
#   3. Hard-coded: gemini-2.5-flash
# Temperature is slightly higher (0.2) than extraction agents to allow
# creative, candidate-specific interview questions.
matching_agent:
  enabled: true
  model: "gemini-2.5-flash"      # Configurable — change to gemini-2.5-pro if needed
  temperature: 0.2               # Slightly higher — allows creative interview questions
  max_output_tokens: 3072        # Larger — 9-section InsightsPayload is verbose

# ── Gemini Settings (only used when enable_reasoning_enrichment: true) ───────
gemini_model: "gemini-2.5-pro"
gemini_api_key: ""                   # Or set GEMINI_API_KEY env var

# ── Mem0 Settings (Sprint 6A — Recruiter Memory Layer) ───────────────────────
# Set mem0_api_key or export MEM0_API_KEY env var.
# If not configured, the app works normally — memory features are silently disabled.
mem0_api_key: ""                     # Or set MEM0_API_KEY env var
mem0_agent:
  default_user_id: "aptiva_recruiter" # Per-recruiter ID (change for multi-user)
  memory_limit: 10                    # Max memories returned per recall()

# ── Data Settings ────────────────────────────────────────────────────────────
data:
  auto_extract_zip: true
  data_dir: "./data"
  # Expected files inside ZIP (discovered automatically)
  expected_files:
    - candidates.jsonl
    - sample_candidates.json
    - candidate_schema.json
    - job_description.docx
    - redrob_signals_doc.docx
    - submission_spec.docx
    - sample_submission.csv
    - validate_submission.py

# ── Ranking Settings ─────────────────────────────────────────────────────────
ranking:
  top_n: 100
  tfidf_max_features: 8000
  tfidf_ngram_range: [1, 2]
  tfidf_min_df: 2

# ── Scoring Weights ───────────────────────────────────────────────────────────
scoring_weights:
  title: 0.30
  skills: 0.25
  career: 0.20
  experience: 0.10
  education: 0.05
  location: 0.05
  engagement: 0.05

# ── Hireability Index™ Weights ────────────────────────────────────────────────
hireability_weights:
  technical_fit: 0.35
  career_relevance: 0.25
  behavior_signals: 0.20
  availability: 0.10
  trust_score: 0.10
