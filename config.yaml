enable_reasoning_enrichment: false
enable_streamlit_demo: true
enable_judge_mode: true
enable_comparison_mode: true
enable_hireability_index: true
jd_agent:
  enabled: true
  model: gemini-2.5-flash
  temperature: 0.1
  max_output_tokens: 4096
resume_agent:
  enabled: true
  model: gemini-2.5-flash
  temperature: 0.1
  max_output_tokens: 4096
matching_agent:
  enabled: true
  model: gemini-2.5-flash
  temperature: 0.2
  max_output_tokens: 4096
comparison_agent:
  enabled: true
  model: gemini-2.5-flash
  temperature: 0.3
  max_output_tokens: 3072
gemini_model: gemini-2.5-pro
gemini_api_key: ''
mem0_api_key: ''
mem0_agent:
  default_user_id: aptiva_recruiter
  memory_limit: 10
data:
  auto_extract_zip: true
  data_dir: ./data
  expected_files:
  - candidates.jsonl
  - sample_candidates.json
  - candidate_schema.json
  - job_description.docx
  - redrob_signals_doc.docx
  - submission_spec.docx
  - sample_submission.csv
  - validate_submission.py
ranking:
  top_n: 100
  tfidf_max_features: 8000
  tfidf_ngram_range:
  - 1
  - 2
  tfidf_min_df: 2
scoring_weights:
  title: 0.3
  skills: 0.25
  career: 0.2
  experience: 0.1
  education: 0.05
  location: 0.05
  engagement: 0.05
hireability_weights:
  technical_fit: 0.35
  career_relevance: 0.25
  behavior_signals: 0.2
  availability: 0.1
  trust_score: 0.1
voice:
  enabled: true
  default_voice: Kaveri
  sample_rate: 16000
  cache_enabled: true
